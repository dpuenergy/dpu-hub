name: Keep Streamlit apps awake

on:
  schedule:
    - cron: '0 6,12,18 * * *'   # 3x denně: 6:00, 12:00, 18:00 UTC
  workflow_dispatch:              # možnost spustit ručně

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping dpuenergy-komunita
        run: curl -s -o /dev/null -w "%{http_code}" https://dpuenergy-komunita.streamlit.app/

      - name: Ping dpuenergy-podklady
        run: curl -s -o /dev/null -w "%{http_code}" https://dpuenergy-podklady.streamlit.app/
