<style>
*, *::before, *::after { box-sizing: border-box; }
body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; font-size: 13px; background: #eef2f7; color: #1a1a2e; }

/* ── Header ── */
header {
  background: #1b3d6e; color: #fff;
  padding: 10px 20px; display: flex; align-items: center; gap: 8px;
  box-shadow: 0 2px 6px rgba(0,0,0,.25); flex-wrap: wrap;
}
header h1 { margin: 0; font-size: 15px; flex: 1; font-weight: 600; min-width: 200px; }
.hbtn {
  padding: 5px 11px; border: 1px solid rgba(255,255,255,.3);
  border-radius: 5px; background: rgba(255,255,255,.1); color: #fff;
  cursor: pointer; font-size: 12px; white-space: nowrap;
}
.hbtn:hover { background: rgba(255,255,255,.22); }
.hbtn.accent { background: rgba(255,200,50,.25); border-color: rgba(255,200,50,.5); }
.hbtn.accent:hover { background: rgba(255,200,50,.4); }
#templateStatus { font-size: 11px; color: rgba(255,255,255,.65); white-space: nowrap; }

/* ── Project panel ── */
.project-panel { background: #fff; border-bottom: 2px solid #d1dce8; padding: 10px 20px; }
.pfields { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
.pf { display: flex; flex-direction: column; gap: 2px; }
.pf label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: .4px; }
.pf input { border: 1px solid #d1dce8; border-radius: 4px; padding: 3px 7px; font-size: 13px; width: 170px; }
.pf input:focus { outline: none; border-color: #1b3d6e; }
.pf.wide input { width: 240px; }
.pf.narrow input { width: 115px; }

/* ── Tabs ── */
.tabs-bar {
  background: #fff; border-bottom: 1px solid #d1dce8;
  display: flex; align-items: stretch; overflow-x: auto;
  padding: 0 14px; scrollbar-width: thin;
}
.tab {
  padding: 8px 13px; cursor: pointer; border-bottom: 3px solid transparent;
  font-size: 13px; color: #666; white-space: nowrap;
  display: flex; align-items: center; gap: 5px; user-select: none;
}
.tab:hover { color: #1b3d6e; }
.tab.active { color: #1b3d6e; border-bottom-color: #1b3d6e; font-weight: 600; }
.tab-name { border: none; outline: none; background: transparent; font-size: 13px; color: inherit; font-weight: inherit; width: 90px; cursor: text; }
.tab-del { opacity: 0; font-size: 11px; padding: 1px 3px; border-radius: 3px; cursor: pointer; line-height: 1; }
.tab:hover .tab-del { opacity: .5; }
.tab-del:hover { opacity: 1 !important; background: #fee2e2; color: #dc2626; }
.tab-add { padding: 8px 12px; cursor: pointer; font-size: 20px; color: #aaa; line-height: 1; }
.tab-add:hover { color: #1b3d6e; }

/* ── Main ── */
.main { padding: 14px 20px; }
.toolbar { display: flex; gap: 7px; margin-bottom: 10px; align-items: center; flex-wrap: wrap; }
.btn { padding: 5px 12px; border-radius: 5px; border: 1px solid #d1dce8; background: #fff; cursor: pointer; font-size: 12px; color: #333; }
.btn:hover { background: #f0f4f8; }
.btn.primary { background: #1b3d6e; border-color: #1b3d6e; color: #fff; }
.btn.primary:hover { background: #2451a0; }
.btn.green { background: #dcfce7; border-color: #86efac; color: #166534; }
.btn.green:hover { background: #bbf7d0; }
.btn.sm { padding: 3px 8px; font-size: 11px; }

/* ── Table ── */
.table-wrap { overflow-x: auto; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.12); }
table { border-collapse: collapse; background: #fff; white-space: nowrap; }

th {
  font-size: 10px; font-weight: 600; padding: 5px 6px;
  text-align: center; color: #fff; border: 1px solid rgba(255,255,255,.2);
  position: sticky; top: 0; z-index: 2;
}
.h-stav { background: #1b4f72; }
.h-new  { background: #1a5276; }
.h-cost { background: #0e3d4d; }
.h-act  { background: #374151; }
.h-dark { filter: brightness(.82); }

td { border: 1px solid #e8edf3; padding: 1px 2px; vertical-align: middle; }
tr:hover td { background: #f5f9ff; }
.total-row td { background: #eef2f7 !important; font-weight: 600; }

/* Row type highlighting */
tr.row-nova-only td       { background: #f0fdf4; }
tr.row-nova-only:hover td { background: #dcfce7; }
tr.row-manual:hover td    { background: #fffbeb; }

.ci {
  width: 100%; min-width: 0; border: none; background: transparent;
  font-size: 12px; font-family: inherit; padding: 3px 5px; outline: none; color: #111;
}
.ci:focus { background: #dbeafe; border-radius: 3px; }
.ci.num { text-align: right; }
.ci.w40  { width: 40px; }
.ci.w50  { width: 50px; }
.ci.w55  { width: 55px; }
.ci.w70  { width: 70px; }
.ci.w100 { width: 100px; }
.ci.w130 { width: 130px; }
.ci.w160 { width: 160px; }
.ci.manual { background: #fef3c7; color: #78350f; border-radius: 3px; }

.cv {
  display: block; padding: 3px 6px; font-size: 12px;
  text-align: right; color: #344; background: #f0f5ff; min-width: 55px;
}

.act-btns { display: flex; gap: 2px; padding: 2px 3px; align-items: center; justify-content: center; flex-wrap: wrap; }
.ab {
  border: none; background: none; cursor: pointer;
  padding: 2px 5px; border-radius: 3px; font-size: 12px; line-height: 1; color: #555;
}
.ab:hover { background: #e8edf3; }
.ab.del:hover { background: #fee2e2; color: #dc2626; }
.ab.cat { font-size: 11px; color: #1b3d6e; }
.ab.cat:hover { background: #dbeafe; }
.ab.reset { font-size: 10px; color: #b45309; padding: 1px 3px; }
.ab.reset:hover { background: #fef3c7; }
.ab.note-btn { font-size: 11px; color: #b45309; padding: 2px 4px; }
.ab.note-btn:hover { background: #fef3c7; }
.ab.note-btn.active { color: #92400e; background: #fef3c7; }

/* Note row */
tr.note-row td { background: #fffde7 !important; padding: 4px 8px; border-top: none; }
tr.note-row:hover td { background: #fff8c5 !important; }
tr.note-row textarea {
  width: 100%; border: 1px solid #fde68a; border-radius: 4px;
  padding: 4px 7px; font-size: 12px; resize: vertical; min-height: 34px;
  background: #fffef5; font-family: inherit; outline: none; color: #333;
}
tr.note-row textarea:focus { border-color: #f59e0b; }

/* Předřadník checkbox inline */
.predradnik-wrap { display: flex; flex-direction: column; align-items: center; gap: 1px; }
.predradnik-lbl { font-size: 9px; color: #888; display: flex; align-items: center; gap: 2px; cursor: pointer; user-select: none; }
.predradnik-lbl input[type=checkbox] { width: 11px; height: 11px; margin: 0; cursor: pointer; }

/* ── Bottom section ── */
.bottom-section { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 14px; }
@media (max-width: 860px) { .bottom-section { grid-template-columns: 1fr; } }

.card { background: #fff; border-radius: 8px; padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
.card h3 { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #1b3d6e; margin: 0 0 10px; letter-spacing: .5px; }

.param-row { display: flex; align-items: center; gap: 6px; padding: 4px 0; border-bottom: 1px solid #f1f5f9; }
.param-row:last-child { border-bottom: none; }
.param-row label { font-size: 12px; color: #555; flex: 1; }
.param-row input.pval { width: 90px; border: 1px solid #d1dce8; border-radius: 4px; padding: 3px 6px; text-align: right; font-size: 12px; }
.param-row input.pval:focus { outline: none; border-color: #1b3d6e; }
.param-row .unit { font-size: 11px; color: #888; width: 58px; }
.param-row input.pname { flex: 1; border: 1px solid #d1dce8; border-radius: 4px; padding: 3px 6px; font-size: 12px; }
.param-row input.pname:focus { outline: none; border-color: #1b3d6e; }
.extras-head { display: flex; justify-content: space-between; align-items: center; padding: 6px 0 4px; border-top: 1px solid #d1dce8; margin-top: 6px; }
.extras-head span { font-size: 11px; font-weight: 600; color: #1b3d6e; }

.sum-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #f1f5f9; font-size: 12px; }
.sum-row:last-child { border-bottom: none; }
.sum-row.highlight { color: #15803d; }
.sum-row.total { font-weight: 700; color: #1b3d6e; border-top: 2px solid #d1dce8; margin-top: 4px; padding-top: 7px; }
.sum-label { color: #555; }
.sum-val { font-weight: 600; font-variant-numeric: tabular-nums; }
.sum-sep { border: none; border-top: 1px solid #e8edf3; margin: 5px 0; }

/* ── Rekap ── */
.rekap-table { width: 100%; border-collapse: collapse; }
.rekap-table th { background: #1b3d6e; color: #fff; padding: 7px 10px; text-align: left; font-size: 11px; white-space: nowrap; position: static !important; }
.rekap-table td { border: 1px solid #e8edf3; padding: 5px 10px; font-size: 12px; }
.rekap-table tr:nth-child(even) td { background: #f7faff; }
.rekap-table .lbl { color: #555; }
.rekap-table .unit { color: #888; font-size: 11px; }
.rekap-table .num { text-align: right; }
.rekap-section td { background: #f0f4f8 !important; font-style: italic; color: #666; font-size: 11px; padding: 3px 10px; }

/* ── Catalog modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.45);
  z-index: 100; display: flex; align-items: center; justify-content: center;
}
.modal-box {
  background: #fff; border-radius: 10px; width: 90vw; max-width: 900px;
  max-height: 85vh; display: flex; flex-direction: column;
  box-shadow: 0 8px 40px rgba(0,0,0,.3);
}
.modal-head { background: #1b3d6e; color: #fff; padding: 12px 18px; border-radius: 10px 10px 0 0; display: flex; align-items: center; }
.modal-head h2 { margin: 0; font-size: 15px; flex: 1; }
.modal-close { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; padding: 0 4px; opacity: .7; }
.modal-close:hover { opacity: 1; }
.modal-tabs { display: flex; border-bottom: 1px solid #d1dce8; padding: 0 16px; background: #f7faff; }
.modal-tab { padding: 9px 16px; cursor: pointer; border-bottom: 3px solid transparent; font-size: 13px; color: #666; }
.modal-tab.active { color: #1b3d6e; border-bottom-color: #1b3d6e; font-weight: 600; }
.modal-body { padding: 14px 16px; overflow-y: auto; flex: 1; }
.modal-desc { font-size: 12px; color: #666; margin-bottom: 10px; }
.modal-toolbar { margin-bottom: 10px; }

.cat-table { width: 100%; border-collapse: collapse; }
.cat-table th { background: #1b4f72; color: #fff; padding: 6px 8px; text-align: left; font-size: 11px; font-weight: 600; }
.cat-table td { border: 1px solid #e8edf3; padding: 1px 2px; }
.cat-table tr:hover td { background: #f5f9ff; }
.cat-ci { width: 100%; border: none; background: transparent; font-size: 12px; padding: 4px 6px; outline: none; }
.cat-ci:focus { background: #dbeafe; }
.cat-ci.num { text-align: right; }

/* ── Picker popup ── */
.picker-popup {
  position: fixed; z-index: 200; background: #fff; border-radius: 7px;
  box-shadow: 0 4px 20px rgba(0,0,0,.25); border: 1px solid #d1dce8;
  min-width: 260px; max-width: 360px; max-height: 320px; overflow-y: auto;
}
.picker-head {
  background: #1b3d6e; color: #fff; padding: 7px 12px; font-size: 12px; font-weight: 600;
  display: flex; justify-content: space-between; align-items: center;
  border-radius: 6px 6px 0 0; position: sticky; top: 0;
}
.picker-head button { background: none; border: none; color: #fff; cursor: pointer; font-size: 16px; padding: 0 2px; opacity: .7; }
.picker-head button:hover { opacity: 1; }
.picker-empty { padding: 14px 12px; font-size: 12px; color: #888; text-align: center; }
.picker-item { padding: 7px 12px; cursor: pointer; border-bottom: 1px solid #f1f5f9; font-size: 12px; }
.picker-item:last-child { border-bottom: none; }
.picker-item:hover { background: #eff6ff; }
.picker-item strong { display: block; color: #1b3d6e; }
.picker-item small { color: #888; font-size: 11px; }

/* ── Print ── */
@media print {
  @page { size: A4 landscape; margin: 8mm 6mm; }
  header, .tabs-bar, .toolbar, .tab-add, .tab-del, .act-btns,
  .modal-overlay, .picker-popup, .hbtn, #templateStatus { display: none !important; }
  body { background: #fff; }
  .main { padding: 4px; }
  .project-panel { border-bottom: 1px solid #999; padding: 6px 8px; }
  .table-wrap { overflow: visible !important; box-shadow: none; border-radius: 0; }
  th { position: static !important; font-size: 8px; padding: 3px 4px; }
  td { font-size: 8px; padding: 1px 2px; }
  .ci { font-size: 8px; }
  .cv { font-size: 8px; padding: 2px 4px; min-width: 40px; }
  .card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
  .bottom-section { margin-top: 6px; gap: 6px; }
}
body.dark{background:#0f1624;color:#e8edf8}body.dark .card,.dark .panel{background:#1a2235;border-color:rgba(100,140,255,.15)}body.dark input,body.dark select,body.dark textarea{background:#1a2235;color:#e8edf8;border-color:rgba(100,140,255,.2)}
</style>

// ════════════════════════════════════════════════════
// VÝPOČTY
// ════════════════════════════════════════════════════
function n(v) { const x = parseFloat(v); return isNaN(x) ? 0 : x; }

function calcRow(r) {
  const isNovaOnly = r.row_type === 'nova_only';
  const faktorPc   = r.predradnik !== false ? 1.1 : 1.0;  // předřadník

  const pocet     = n(r.pocet);
  const pocetNova = (r.pocet_nova !== '' && r.pocet_nova !== null && r.pocet_nova !== undefined)
    ? n(r.pocet_nova)
    : pocet;
  const hasManualCount = !isNovaOnly
    && r.pocet_nova !== '' && r.pocet_nova !== null && r.pocet_nova !== undefined
    && n(r.pocet_nova) !== pocet;

  // Stávající (nulové pro nova_only)
  const vykon_j  = isNovaOnly ? 0 : n(r.trubice) * n(r.vykon_w) * faktorPc;
  const vykon_kw = isNovaOnly ? 0 : vykon_j * pocet / 1000;
  const sp_stav  = isNovaOnly ? 0 : n(r.provoz) * vykon_kw;

  // Nové
  const prikon_kw = n(r.prikon_w) * pocetNova / 1000 * n(r.koef || 1);
  const sp_nova   = n(r.provoz) * prikon_kw;
  const c_sv      = n(r.cena_sv)  * pocetNova;
  const c_dem     = n(r.cena_dem) * pocetNova;
  const c_pol     = c_sv + c_dem;

  return { vykon_j, vykon_kw, sp_stav, prikon_kw, sp_nova, c_sv, c_dem, c_pol, pocetNova, hasManualCount };
}

function calcObjekt(obj) {
  const rows            = obj.rows.map(r => ({ r, c: calcRow(r) }));
  const sum             = fn => rows.reduce((a, x) => a + fn(x), 0);
  const vykon_kw_total  = sum(x => x.c.vykon_kw);
  const prikon_kw_total = sum(x => x.c.prikon_kw);
  const sp_stav         = sum(x => x.c.sp_stav);
  const sp_nova         = sum(x => x.c.sp_nova);
  const c_sv_total      = sum(x => x.c.c_sv);
  const c_dem_total     = sum(x => x.c.c_dem);
  const extrasSum       = (obj.extras||[]).reduce((s, e) => s + n(e.hodnota), 0);
  const inv             = sum(x => x.c.c_pol) + n(obj.ostatni) + n(obj.revize) + extrasSum;
  const sazba           = n(obj.sazba) || 6;
  const rn_stav         = sp_stav * sazba + n(obj.udrzba_stav);
  const rn_nova         = sp_nova * sazba + n(obj.udrzba_nova);
  const u_kc            = rn_stav - rn_nova;
  const u_kwh           = sp_stav - sp_nova;
  const navr            = u_kc > 0 ? inv / u_kc * 12 : null;
  const u_pct           = rn_stav > 0 ? (1 - rn_nova / rn_stav) * 100 : 0;
  return { rows, vykon_kw_total, prikon_kw_total, sp_stav, sp_nova, c_sv_total, c_dem_total, inv, rn_stav, rn_nova, u_kc, u_kwh, navr, u_pct, sazba, extrasSum };
}

// ════════════════════════════════════════════════════
// FORMÁTOVÁNÍ
// ════════════════════════════════════════════════════
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function fmt(v, dec)  { return v.toLocaleString('cs-CZ', { minimumFractionDigits: dec, maximumFractionDigits: dec }); }
function fmtI(v)      { return Math.round(v).toLocaleString('cs-CZ'); }
function fmtKc(v)     { return fmtI(v) + '\u00a0Kč'; }
function cv(v, dec)   {
  if (!v) return '<span class="cv" style="background:#fafafa;color:#ccc"></span>';
  return `<span class="cv">${dec === 0 ? fmtI(v) : fmt(v, dec)}</span>`;
}

// ── Rekapitulace ──
function renderRekap() {
  const data = S.objekty.map(obj => ({ obj, c: calcObjekt(obj) }));
  const colH = data.map(({obj}) => `<th>${esc(obj.nazev)}</th>`).join('') + '<th>SOUHRN</th>';
  function mRow(label, unit, getVal, isSum) {
    const vals  = data.map(({obj,c}) => getVal(obj,c));
    const cells = vals.map(v => `<td class="num">${v===null||v===undefined?'—':(typeof v==='number'?(Math.abs(v)>10||v===0?fmtI(v):fmt(v,2)):v)}</td>`).join('');
    const total = isSum ? fmtI(vals.reduce((s,v)=>s+(typeof v==='number'&&!isNaN(v)?v:0),0)) : '—';
    return `<tr><td class="lbl">${label}</td><td class="unit">${unit}</td>${cells}<td class="num" style="font-weight:700">${total}</td></tr>`;
  }
  const tbody = [
    mRow('Stávající příkon celkem',  'kW',      (_,c)=>c.vykon_kw_total,  true),
    mRow('Navrhovaný příkon celkem', 'kW',      (_,c)=>c.prikon_kw_total, true),
    mRow('Stávající spotřeba',       'kWh/rok', (_,c)=>c.sp_stav,         true),
    mRow('Navrhovaná spotřeba',      'kWh/rok', (_,c)=>c.sp_nova,         true),
    mRow('Úspora elektřiny',         'kWh/rok', (_,c)=>c.u_kwh,           true),
    mRow('Cena el. energie',         'Kč/kWh',  (_,c)=>c.sazba,           false),
    mRow('Stávající roční náklady',  'Kč/rok',  (_,c)=>c.rn_stav,         true),
    mRow('Nové roční náklady',       'Kč/rok',  (_,c)=>c.rn_nova,         true),
    mRow('Roční úspora nákladů',     'Kč/rok',  (_,c)=>c.u_kc,            true),
    mRow('Celková úspora',           '%',       (_,c)=>c.u_pct,           false),
    mRow('Prostá návratnost',        'měs.',    (_,c)=>c.navr!==null?c.navr:null, false),
    `<tr class="rekap-section"><td colspan="${data.length+3}">Rozpis investice:</td></tr>`,
    mRow('Svítidla',             'Kč', (_,c)=>c.c_sv_total,  true),
    mRow('De-montáž',            'Kč', (_,c)=>c.c_dem_total, true),
    mRow('Ostatní elektromontáž','Kč', (o)  =>n(o.ostatni),  true),
    mRow('Revize',               'Kč', (o)  =>n(o.revize),   true),
    mRow('Další položky',        'Kč', (_,c)=>c.extrasSum,   true),
    mRow('Celková investice',    'Kč', (_,c)=>c.inv,         true),
  ].join('');
  return `
<div>
  <div class="toolbar"><span style="font-size:14px;font-weight:600;color:#1b3d6e">Rekapitulace — přehled všech objektů</span></div>
  <div class="table-wrap">
    <table class="rekap-table">
      <thead><tr><th style="min-width:220px">Ukazatel</th><th style="min-width:70px">Jednotka</th>${colH}</tr></thead>
      <tbody>${tbody}</tbody>
    </table>
  </div>
</div>`;
}

function printPreview() {
  const win = window.open('', '_blank', 'scrollbars=yes,width=1400,height=900');
  if (!win) { window.print(); return; }
  win.document.write(buildPrintHTML());
  win.document.close();
  win.focus();
}

  const headerInfo = `

      return `<tr style="${isNova?'background:#f0fdf4;':''}">

        <td style="${tdStyle}">${esc(r.typ)}</td>

        <td style="${tdCvStyle}">${fv(c.c_pol,0)}</td>
        ${r.note ? `<td style="${tdStyle};font-style:italic;color:#888">${esc(r.note)}</td>` : '<td style="'+tdStyle+'"></td>'}
      </tr>`;
    }).join('');

    const extrasHTML = (obj.extras||[]).filter(e=>n(e.hodnota)>0).map(e =>
      `<tr><td colspan="6" style="${tdStyle}">${esc(e.nazev||'Další položka')}</td><td colspan="2" style="${tdCvStyle};font-weight:600">${fmtKc(n(e.hodnota))}</td></tr>`
    ).join('');

    return `
<div style="margin-bottom:20px;page-break-inside:avoid">
  <div style="background:#1b3d6e;color:#fff;padding:5px 10px;font-size:12px;font-weight:600;margin-bottom:4px">${esc(obj.nazev)}</div>

    <thead>

        <th colspan="8" style="${thStyle}">STÁVAJÍCÍ STAV</th>

        <th style="${thStyle}"></th>
      </tr>
    </thead>
    <tbody>
      ${rowsHTML}
      <tr style="background:#eef2f7;font-weight:600">
        <td colspan="3" style="${tdStyle};text-align:right">CELKEM:</td>
        <td style="${tdStyle};text-align:right">${fmtI(calc.rows.reduce((s,x)=>s+n(x.r.pocet),0))}</td>

        <td style="${tdCvStyle}">${fmt(calc.vykon_kw_total,2)}</td>
        <td style="${tdCvStyle}">${fmtI(calc.sp_stav)}</td>
        <td style="${tdStyle}"></td>
        <td style="${tdStyle};text-align:right">${fmtI(calc.rows.reduce((s,x)=>s+x.c.pocetNova,0))}</td>

        <td style="${tdCvStyle}">${fmtI(calc.c_sv_total)}</td>
        <td style="${tdStyle}"></td>
        <td style="${tdCvStyle}">${fmtI(calc.c_dem_total)}</td>
        <td style="${tdStyle}"></td>
      </tr>
    </tbody>
  </table>
  </div>

${rekapHTML}
${objektyHTML}

}

      <td><input class="cat-ci"     value="${esc(it.nazev)}"   oninput="setCat('stavajici',${it.id},'nazev',this.value)"   placeholder="Název"></td>
      <td><input class="cat-ci"     value="${esc(it.typ)}"     oninput="setCat('stavajici',${it.id},'typ',this.value)"     placeholder="Typ svítidla"></td>
      <td><input class="cat-ci"     value="${esc(it.rozmer)}"  oninput="setCat('stavajici',${it.id},'rozmer',this.value)"  placeholder="Rozměr"></td>
      <td><input class="cat-ci num" type="number" value="${esc(it.trubice)}" oninput="setCat('stavajici',${it.id},'trubice',this.value)"></td>
      <td><input class="cat-ci num" type="number" value="${esc(it.vykon_w)}" oninput="setCat('stavajici',${it.id},'vykon_w',this.value)"></td>
      <td><button class="ab del" onclick="delCat('stavajici',${it.id})">✕</button></td>
    </tr>`).join('')}
    ${!items.length?'<tr><td colspan="6" style="text-align:center;padding:14px;color:#888;font-size:12px">Žádné položky.</td></tr>':''}
    </tbody></table>`;

let _picker = { type:null, objIdx:null, rowId:null };

function openPicker(event, type, objIdx, rowId) {
  event.stopPropagation();
  _picker = { type, objIdx, rowId };
  const items = type==='stavajici' ? S.catalog.stavajici : S.catalog.nova;
  const title = type==='stavajici' ? 'Stávající svítidla' : 'Nová svítidla';
  const itemsHtml = !items.length
    ? `<div class="picker-empty">Katalog je prázdný.<br>Přidejte položky v sekci <strong>Katalog svítidel</strong>.</div>`
    : items.map(it => {
        const sub = type==='stavajici'
          ? [it.typ, it.rozmer, it.vykon_w?it.vykon_w+' W':''].filter(Boolean).join(' · ')
          : [it.prikon_w?it.prikon_w+' W':'', it.montaz, it.cena_sv?fmtI(it.cena_sv)+' Kč':''].filter(Boolean).join(' · ');
        return `<div class="picker-item" onclick="selectFromCatalog(${it.id})">
          <strong>${esc(it.nazev||'(bez názvu)')}</strong>
          ${sub?`<small>${esc(sub)}</small>`:''}
        </div>`;
      }).join('');
  const popup = document.getElementById('pickerPopup');
  popup.innerHTML = `<div class="picker-head"><span>${title}</span><button onclick="closePicker()">✕</button></div>${itemsHtml}`;
  popup.style.display = 'block';
  const rect = event.currentTarget.getBoundingClientRect();
  const popW = 300;
  let left = rect.left;
  if (left+popW > window.innerWidth-10) left = window.innerWidth-popW-10;
  popup.style.left = left+'px';
  popup.style.top  = (rect.bottom+4+window.scrollY)+'px';
}
function closePicker() { document.getElementById('pickerPopup').style.display='none'; }
function selectFromCatalog(itemId) {
  const { type, objIdx, rowId } = _picker;
  const row = S.objekty[objIdx]?.rows.find(r=>r.id===rowId);
  if (!row) return;
  if (type==='stavajici') {
    const it = S.catalog.stavajici.find(i=>i.id===itemId);
    if (it) { if(it.typ)row.typ=it.typ; if(it.rozmer)row.rozmer=it.rozmer; if(it.trubice)row.trubice=it.trubice; if(it.vykon_w)row.vykon_w=it.vykon_w; }
  } else {
    const it = S.catalog.nova.find(i=>i.id===itemId);
    if (it) { if(it.nazev)row.svitidla=it.nazev; if(it.montaz)row.montaz=it.montaz; if(it.prikon_w)row.prikon_w=it.prikon_w; if(it.koef)row.koef=it.koef; if(it.cena_sv)row.cena_sv=it.cena_sv; if(it.cena_dem)row.cena_dem=it.cena_dem; }
  }
  closePicker(); scheduleSave(); renderMain();
}
document.addEventListener('click', e => {
  const p = document.getElementById('pickerPopup');
  if (p.style.display!=='none' && !p.contains(e.target)) closePicker();
});

// Patches a cell value in sheet XML, preserving s= style attribute
function patchCell(xml, addr, value) {
  const re = new RegExp(`<c(\\s[^>]*?r="${addr}"[^>]*?)(/>|>[\\s\\S]*?</c>)`);
  const match = xml.match(re);
  if (!match) return xml;
  let attrs = match[1].replace(/\s+t="[^"]*"/g, '');
  let cell;
  if (value === null || value === undefined || value === '') {
    cell = `<c${attrs}/>`;
  } else if (typeof value === 'number') {
    const v = isFinite(value) ? value : 0;
    cell = `<c${attrs}><v>${v}</v></c>`;
  } else {
    const esc = String(value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    cell = `<c${attrs} t="inlineStr"><is><t xml:space="preserve">${esc}</t></is></c>`;
  }
  return xml.replace(re, () => cell);
}

// Shifts rows > afterRow down by count positions in sheet XML
function shiftRowsInXml(xml, afterRow, count) {
  if (count <= 0) return xml;
  const nums = new Set();
  for (const m of xml.matchAll(/<row\s[^>]*r="(\d+)"/g)) {
    const nr = parseInt(m[1]); if (nr > afterRow) nums.add(nr);
  }
  for (const nr of [...nums].sort((a,b)=>b-a)) {
    const nn = nr + count;
    xml = xml.replace(new RegExp(`(<row\\s[^>]*r=)"${nr}"`, 'g'), `$1"${nn}"`);
    xml = xml.replace(new RegExp(`\\br="([A-Z]+)${nr}"`, 'g'), (_, col) => `r="${col}${nn}"`);
  }
  xml = xml.replace(/(<dimension\s+ref="[A-Z]+\d+:[A-Z]+)(\d+)("\s*\/>)/, (m, pre, endRow, suf) => `${pre}${parseInt(endRow)+count}${suf}`);
  xml = xml.replace(/ref="([A-Z]+)(\d+):([A-Z]+)(\d+)"/g, (m, c1, r1, c2, r2) => {
    const nr1 = parseInt(r1)>afterRow ? parseInt(r1)+count : parseInt(r1);
    const nr2 = parseInt(r2)>afterRow ? parseInt(r2)+count : parseInt(r2);
    return `ref="${c1}${nr1}:${c2}${nr2}"`;
  });
  return xml;
}

// Clone last data row to create new styled rows
function insertClonedRows(xml, lastDataRow, count) {
  if (count <= 0) return xml;
  const re = new RegExp(`(<row\\s[^>]*r="${lastDataRow}"[^>]*>)([\\s\\S]*?)(</row>)`);
  const m = xml.match(re);
  if (!m) return xml;
  let newRows = '';
  for (let i = 1; i <= count; i++) {
    const nr = lastDataRow + i;
    const rowOpen = m[1].replace(`r="${lastDataRow}"`, `r="${nr}"`);
    const cells   = m[2].replace(new RegExp(`\\br="([A-Z]+)${lastDataRow}"`, 'g'), (_, col) => `r="${col}${nr}"`);
    newRows += rowOpen + cells + m[3];
  }
  return xml.replace(re, () => m[0] + newRows);
}

// Parse sheet file paths from workbook XML + rels
function getSheetPaths(wbXml, wbRelsXml) {
  const paths = {}, rels = {};
  for (const m of wbRelsXml.matchAll(/<Relationship\b[^>]*>/g)) {
    const id  = (m[0].match(/\bId="([^"]+)"/)     || [])[1];
    const tgt = (m[0].match(/\bTarget="([^"]+)"/) || [])[1];
    if (id && tgt) rels[id] = tgt.startsWith('/') ? tgt.slice(1) : 'xl/' + tgt;
  }
  for (const m of wbXml.matchAll(/<sheet\b[^>]*>/g)) {
    const name = (m[0].match(/\bname="([^"]+)"/) || [])[1];
    const rId  = (m[0].match(/\br:id="([^"]+)"/) || [])[1];
    if (name && rId && rels[rId]) paths[name] = rels[rId];
  }
  return paths;
}

function exportExcel() {

      console.error('Export šablony selhal:', err);
      alert('Export šablony selhal: ' + err.message + '\n\nSpouštím záložní export bez formátování.');
      exportPlain();
    });
  } else {
    exportPlain();
  }
}

async function exportFromTemplate() {
  if (typeof JSZip === 'undefined') throw new Error('JSZip knihovna neni nactena.');
  const zip = await JSZip.loadAsync(_xlsxTemplate);
  zip.remove('xl/calcChain.xml');

  // .xltx -> .xlsx content-type
  let ctXml = await zip.file('[Content_Types].xml').async('string');
  ctXml = ctXml.replace(
    'application/vnd.openxmlformats-officedocument.spreadsheetml.template.main+xml',
    'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml'
  );

  let wbXml     = await zip.file('xl/workbook.xml').async('string');
  let wbRelsXml = await zip.file('xl/_rels/workbook.xml.rels').async('string');
  const paths   = getSheetPaths(wbXml, wbRelsXml);

  const SHEET_NAMES        = ['Objekt A','Objekt B','Objekt C','Objekt D','Objekt E','Objekt F'];
  const TEMPLATE_DATA_ROWS = 36;
  const usedCount          = Math.min(S.objekty.length, SHEET_NAMES.length);

  // Odstranit nepouzite listy Objekt X
  for (let i = usedCount; i < SHEET_NAMES.length; i++) {
    const sname  = SHEET_NAMES[i];
    const shPath = paths[sname];
    if (!shPath) continue;
    zip.remove(shPath);
    const relsPath = shPath.replace('xl/worksheets/', 'xl/worksheets/_rels/') + '.rels';
    if (zip.file(relsPath)) zip.remove(relsPath);
    const escaped = sname.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const sm = wbXml.match(new RegExp('<sheet\\b[^>]*name="' + escaped + '"[^>]*\/>'));
    if (sm) {
      const rId = (sm[0].match(/\br:id="([^"]+)"/) || [])[1];
      wbXml = wbXml.replace(new RegExp('\\s*<sheet\\b[^>]*name="' + escaped + '"[^>]*\/>'), '');
      if (rId) {
        wbRelsXml = wbRelsXml.replace(new RegExp('\\s*<Relationship\\b[^>]*Id="' + rId + '"[^>]*\/>'), '');
        const esc = ('/' + shPath).replace(/\./g, '\\.').replace(/\//g, '\\/');
        ctXml = ctXml.replace(new RegExp('\\s*<Override[^>]*PartName="' + esc + '"[^>]*\/>'), '');
      }
    }
  }
  zip.file('xl/workbook.xml',            wbXml);
  zip.file('xl/_rels/workbook.xml.rels', wbRelsXml);
  zip.file('[Content_Types].xml',        ctXml);

  // Rekapitulace
  const rekapPath = paths['Rekapitulace'];
  if (rekapPath && zip.file(rekapPath)) {
    let rx = await zip.file(rekapPath).async('string');
    rx = patchCell(rx, 'D3', S.project.nazev      || '');
    rx = patchCell(rx, 'G3', S.project.objednatel || '');
    rx = patchCell(rx, 'D4', S.project.tzb        || 'OSVETLENI');
    rx = patchCell(rx, 'D5', S.project.vypracoval || '');
    rx = patchCell(rx, 'D6', S.project.jmeno      || '');
    rx = patchCell(rx, 'D7', S.project.telefon    || '');
    rx = patchCell(rx, 'F7', S.project.email      || '');

    // i=0: datovy sloupec=E, hlavickovy sloupec=C; i=1..5: oba = F..J
    const dataCols = ['E','F','G','H','I','J'];
    const headCols = ['C','F','G','H','I','J'];
    let tot = {vykon:0,prikon:0,sp_stav:0,sp_nova:0,u_kc:0,
               c_sv:0,c_dem:0,ostatni:0,revize:0};

    for (let i = 0; i < usedCount; i++) {
      const obj       = S.objekty[i];
      const calc      = calcObjekt(obj);
      const col       = dataCols[i];
      const hcol      = headCols[i];
      const extrasSum = (obj.extras||[]).reduce((s,e)=>s+n(e.hodnota),0);
      const ostatni   = n(obj.ostatni) + extrasSum;

      rx = patchCell(rx, hcol+'10', obj.nazev || SHEET_NAMES[i]);
      rx = patchCell(rx, col+'11',  calc.vykon_kw_total);
      rx = patchCell(rx, col+'12',  calc.prikon_kw_total);
      rx = patchCell(rx, col+'13',  calc.vykon_kw_total - calc.prikon_kw_total);
      rx = patchCell(rx, col+'14',  calc.sp_stav);
      rx = patchCell(rx, col+'15',  calc.sp_nova);
      rx = patchCell(rx, col+'16',  calc.sp_stav - calc.sp_nova);
      rx = patchCell(rx, col+'17',  calc.u_pct);
      rx = patchCell(rx, col+'18',  calc.sazba);
      rx = patchCell(rx, col+'19',  n(obj.udrzba_stav) - n(obj.udrzba_nova));
      rx = patchCell(rx, col+'20',  calc.u_kc);
      rx = patchCell(rx, col+'21',  calc.navr !== null ? calc.navr : null);

      // Radky 24-27: Objekt A = sloupec C (+ E kvuli souctu), B-F = col
      const ccol = (i === 0) ? 'C' : col;
      rx = patchCell(rx, ccol+'24', calc.c_sv_total);
      rx = patchCell(rx, ccol+'25', calc.c_dem_total);
      rx = patchCell(rx, ccol+'26', ostatni);
      rx = patchCell(rx, ccol+'27', n(obj.revize));
      if (i === 0) {
        rx = patchCell(rx, 'E24', calc.c_sv_total);
        rx = patchCell(rx, 'E25', calc.c_dem_total);
        rx = patchCell(rx, 'E26', ostatni);
        rx = patchCell(rx, 'E27', n(obj.revize));
      }

      tot.vykon   += calc.vykon_kw_total;
      tot.prikon  += calc.prikon_kw_total;
      tot.sp_stav += calc.sp_stav;
      tot.sp_nova += calc.sp_nova;
      tot.u_kc    += calc.u_kc;
      tot.c_sv    += calc.c_sv_total;
      tot.c_dem   += calc.c_dem_total;
      tot.ostatni += ostatni;
      tot.revize  += n(obj.revize);
    }

    // K sloupec - souhrn vsech objektu
    rx = patchCell(rx, 'K11', tot.vykon);
    rx = patchCell(rx, 'K12', tot.prikon);
    rx = patchCell(rx, 'K13', tot.vykon - tot.prikon);
    rx = patchCell(rx, 'K14', tot.sp_stav);
    rx = patchCell(rx, 'K15', tot.sp_nova);
    rx = patchCell(rx, 'K16', tot.sp_stav - tot.sp_nova);
    rx = patchCell(rx, 'K17', tot.sp_stav > 0 ? (1 - tot.sp_nova/tot.sp_stav)*100 : 0);
    rx = patchCell(rx, 'K20', tot.u_kc);
    rx = patchCell(rx, 'K24', tot.c_sv);
    rx = patchCell(rx, 'K25', tot.c_dem);
    rx = patchCell(rx, 'K26', tot.ostatni);
    rx = patchCell(rx, 'K27', tot.revize);
    rx = patchCell(rx, 'K29', tot.c_sv + tot.c_dem + tot.ostatni + tot.revize);

    zip.file(rekapPath, rx);
  }

  // Listy Objekt A-F
  for (let i = 0; i < usedCount; i++) {
    const obj    = S.objekty[i];
    const shPath = paths[SHEET_NAMES[i]];
    if (!shPath || !zip.file(shPath)) continue;
    let sx     = await zip.file(shPath).async('string');
    const calc = calcObjekt(obj);

    const extra      = Math.max(0, calc.rows.length - TEMPLATE_DATA_ROWS);
    if (extra > 0) {
      sx = shiftRowsInXml(sx, 38, extra);
      sx = insertClonedRows(sx, 38, extra);
    }
    const off        = extra;
    const rowOstatni = 41 + off;
    const rowRevize  = 42 + off;
    const rowSazba   = 54 + off;
    const rowCelkem  = 46 + off;

    sx = patchCell(sx, 'A1', obj.nazev || SHEET_NAMES[i]);

    let lastUm = '';
    calc.rows.forEach(({r, c}, ri) => {
      const row    = ri + 3;
      const isNova = r.row_type === 'nova_only';
      const effUm  = r.umisteni || lastUm;
      if (r.umisteni) lastUm = r.umisteni;

      sx = patchCell(sx, 'A'+row, effUm || '');
      if (!isNova) {
        sx = patchCell(sx, 'B'+row, r.typ    || '');
        sx = patchCell(sx, 'C'+row, r.rozmer || '');
        sx = patchCell(sx, 'D'+row, n(r.pocet)   || null);
        sx = patchCell(sx, 'E'+row, n(r.trubice) || null);
        sx = patchCell(sx, 'F'+row, n(r.vykon_w) || null);
        sx = patchCell(sx, 'G'+row, c.vykon_j  > 0 ? c.vykon_j  : null);
        sx = patchCell(sx, 'H'+row, c.vykon_kw > 0 ? c.vykon_kw : null);
        sx = patchCell(sx, 'I'+row, n(r.provoz) || null);
        sx = patchCell(sx, 'J'+row, c.sp_stav  > 0 ? c.sp_stav  : null);
      } else {
        'BCDEFGHIJ'.split('').forEach(col => { sx = patchCell(sx, col+row, null); });
      }
      sx = patchCell(sx, 'K'+row, r.svitidla || '');
      sx = patchCell(sx, 'L'+row, r.montaz   || '');
      sx = patchCell(sx, 'M'+row, c.pocetNova || null);
      sx = patchCell(sx, 'N'+row, n(r.prikon_w) || null);
      sx = patchCell(sx, 'O'+row, n(r.koef || 1));
      sx = patchCell(sx, 'P'+row, c.prikon_kw > 0 ? c.prikon_kw : null);
      sx = patchCell(sx, 'Q'+row, n(r.provoz) > 0 ? n(r.provoz) : null);
      sx = patchCell(sx, 'R'+row, c.sp_nova  > 0 ? c.sp_nova   : null);
      sx = patchCell(sx, 'S'+row, n(r.cena_sv)  || null);
      sx = patchCell(sx, 'T'+row, c.c_sv  > 0 ? c.c_sv  : null);
      sx = patchCell(sx, 'U'+row, n(r.cena_dem) || null);
      sx = patchCell(sx, 'V'+row, c.c_dem > 0 ? c.c_dem : null);
      sx = patchCell(sx, 'W'+row, c.c_pol > 0 ? c.c_pol : null);
    });

    for (let ri = calc.rows.length; ri < TEMPLATE_DATA_ROWS; ri++) {
      const row = ri + 3;
      'ABCDEFGHIJKLMNOPQRSTUVW'.split('').forEach(col => { sx = patchCell(sx, col+row, null); });
    }

    const extrasCombined = n(obj.ostatni) + (obj.extras||[]).reduce((s,e)=>s+n(e.hodnota),0);
    sx = patchCell(sx, 'S'+rowOstatni, extrasCombined || 0);
    sx = patchCell(sx, 'S'+rowRevize,  n(obj.revize)  || 0);
    sx = patchCell(sx, 'M'+rowSazba,   n(obj.sazba)   || 6);
    sx = patchCell(sx, 'D'+rowCelkem,  calc.rows.reduce((s,x)=>s+n(x.r.pocet),0));
    sx = patchCell(sx, 'H'+rowCelkem,  calc.vykon_kw_total);
    sx = patchCell(sx, 'J'+rowCelkem,  calc.sp_stav);
    sx = patchCell(sx, 'M'+rowCelkem,  calc.rows.reduce((s,x)=>s+x.c.pocetNova,0));
    sx = patchCell(sx, 'P'+rowCelkem,  calc.prikon_kw_total);
    sx = patchCell(sx, 'R'+rowCelkem,  calc.sp_nova);
    sx = patchCell(sx, 'T'+rowCelkem,  calc.c_sv_total);
    sx = patchCell(sx, 'V'+rowCelkem,  calc.c_dem_total);
    sx = patchCell(sx, 'W'+rowCelkem,  calc.inv);
    zip.file(shPath, sx);
  }

  const blob  = await zip.generateAsync({
    type: 'blob',
    mimeType: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
    compression: 'DEFLATE', compressionOptions: {level:6}
  });
  const fname = (S.project.nazev||'kalkulace-nahrad').replace(/[<>:"/\\|?*]/g,'_') + '.xlsx';
  const url   = URL.createObjectURL(blob);
  const a     = document.createElement('a');
  a.href = url; a.download = fname; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

function exportPlain() {

  const rColH=['Ukazatel','Jednotka',...S.objekty.map(o=>o.nazev),'SOUHRN'];
  function mRow(label,unit,getVal,isSum) {

    return [label,unit,...vals,isSum?vals.reduce((s,v)=>s+(typeof v==='number'?v:0),0):''];
  }
  const rekapData=[
    ['Kalkulace investičních nákladů a provozních úspor osvětlení — dle ČSN EN 12464-1'],
    [S.project.nazev||'','',S.project.objednatel||''],
    ['Vypracoval:',S.project.vypracoval||'','Jméno:',S.project.jmeno||'','Tel:',S.project.telefon||'','E-mail:',S.project.email||''],
    [],rColH,
    mRow('Stávající příkon celkem','kW',(_,c)=>c.vykon_kw_total,true),
    mRow('Navrhovaný příkon celkem','kW',(_,c)=>c.prikon_kw_total,true),
    mRow('Stávající spotřeba','kWh/rok',(_,c)=>c.sp_stav,true),
    mRow('Navrhovaná spotřeba','kWh/rok',(_,c)=>c.sp_nova,true),
    mRow('Úspora elektřiny','kWh/rok',(_,c)=>c.u_kwh,true),
    mRow('Stávající roční náklady','Kč/rok',(_,c)=>c.rn_stav,true),
    mRow('Nové roční náklady','Kč/rok',(_,c)=>c.rn_nova,true),
    mRow('Roční úspora nákladů','Kč/rok',(_,c)=>c.u_kc,true),
    mRow('Celková úspora','%',(_,c)=>c.u_pct,false),
    mRow('Prostá návratnost','měs.',(_,c)=>c.navr!==null?c.navr:'',false),
    mRow('Celková investice','Kč',(_,c)=>c.inv,true),
  ];
  const wsR=XLSX.utils.aoa_to_sheet(rekapData);
  wsR['!cols']=[{wch:26},{wch:10},...S.objekty.map(()=>({wch:14})),{wch:14}];
  XLSX.utils.book_append_sheet(wb,wsR,'Rekapitulace');

  S.objekty.forEach(obj=>{
    const calc=calcObjekt(obj);
    let lastUm='';
    const H=['Umístění','Typ svítidla','Rozměr','Počet ks','Trubice','Výkon W/ks','PČ×1.1','Výkon jedn.W','Výkon kW','Provoz h/rok','Spotřeba kWh/rok','Svítidla','Montáž','Počet ks (nové)','Příkon W/ks','Koef.','Příkon kW','Provoz','Spotřeba kWh','Cena/ks Kč','Celkem svíd. Kč','Cena/ks dem. Kč','Celkem dem. Kč','Cena pol. Kč','Poznámka'];
    const rows=calc.rows.map(({r,c})=>{
      const effUm = r.umisteni||lastUm; if(r.umisteni)lastUm=r.umisteni;
      return [
        effUm, r.row_type==='nova_only'?'':r.typ, r.row_type==='nova_only'?'':r.rozmer,
        r.row_type==='nova_only'?'':n(r.pocet)||'',
        r.row_type==='nova_only'?'':n(r.trubice)||'',
        r.row_type==='nova_only'?'':n(r.vykon_w)||'',
        r.row_type==='nova_only'?'':r.predradnik!==false?'Ano':'Ne',
        c.vykon_j>0?c.vykon_j:'',c.vykon_kw>0?c.vykon_kw:'',
        r.row_type==='nova_only'?'':n(r.provoz)||'',c.sp_stav>0?c.sp_stav:'',
        r.svitidla,r.montaz,c.pocetNova||'',n(r.prikon_w)||'',n(r.koef||1),
        c.prikon_kw>0?c.prikon_kw:'',n(r.provoz)||'',c.sp_nova>0?c.sp_nova:'',
        n(r.cena_sv)||'',c.c_sv>0?c.c_sv:'',n(r.cena_dem)||'',c.c_dem>0?c.c_dem:'',c.c_pol>0?c.c_pol:'',
        r.note||''
      ];
    });
    const extrasRows = (obj.extras||[]).map(e=>[e.nazev||'Další položka','','','','','','','','','','','','','','','','','','','','','','',n(e.hodnota)||'','']);
    const ws=XLSX.utils.aoa_to_sheet([
      [obj.nazev],[`Zakázka: ${S.project.nazev||''}`,`Objednatel: ${S.project.objednatel||''}`],[],H,
      ...rows,
      ['CELKEM','','',calc.rows.reduce((s,x)=>s+n(x.r.pocet),0),'','','','',calc.vykon_kw_total,'',calc.sp_stav,'','',calc.rows.reduce((s,x)=>s+x.c.pocetNova,0),'','',calc.prikon_kw_total,'',calc.sp_nova,'',calc.c_sv_total,'',calc.c_dem_total,calc.inv,''],
      [],
      ...extrasRows,
      [`Ostatní elektromontáž: ${fmtI(n(obj.ostatni))} Kč`,`Revize: ${fmtI(n(obj.revize))} Kč`,`Sazba: ${n(obj.sazba)} Kč/kWh`],
      [`Stávající náklady: ${fmtI(calc.rn_stav)} Kč/rok`,`Nové náklady: ${fmtI(calc.rn_nova)} Kč/rok`,`Úspora: ${fmtI(calc.u_kc)} Kč/rok`,`Investice: ${fmtI(calc.inv)} Kč`,`Návratnost: ${calc.navr!==null?fmt(calc.navr,1)+' měs.':'—'}`]
    ]);
    ws['!cols']=[{wch:20},{wch:18},{wch:10},{wch:7},{wch:7},{wch:8},{wch:6},{wch:10},{wch:10},{wch:8},{wch:13},{wch:20},{wch:12},{wch:8},{wch:8},{wch:6},{wch:11},{wch:8},{wch:13},{wch:12},{wch:13},{wch:12},{wch:13},{wch:13},{wch:30}];
    XLSX.utils.book_append_sheet(wb,ws,obj.nazev.substring(0,31).replace(/[\\\/\?\*\[\]:]/g,'_'));
  });
  const fname=(S.project.nazev||'kalkulace-nahrad').replace(/[<>:"/\\|?*]/g,'_')+'.xlsx';
  XLSX.writeFile(wb,fname);
}

function importFromFile(evt) {
  const file=evt.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try {
      const data=JSON.parse(e.target.result);
      if(!data.objekty)throw new Error('Neplatný formát');
      S.project=data.project||S.project; S.objekty=data.objekty; S.catalog=data.catalog||{stavajici:[],nova:[]};
      // Dopln chybějící extras pro starší data
      S.objekty.forEach(o=>{ if(!o.extras)o.extras=[]; });
      S.activeTab=0;
      const ids=[...S.objekty.flatMap(o=>[o.id,...o.rows.map(r=>r.id)]),...(S.catalog.stavajici||[]).map(i=>i.id),...(S.catalog.nova||[]).map(i=>i.id)].filter(Boolean);
      _rid=_oid=_cid=(ids.length?Math.max(...ids):0)+1;
      render();
    } catch(err){alert('Chyba: '+err.message);}
  };
  reader.readAsText(file,'utf-8'); evt.target.value='';
}
function autoLoad() {
  try {
    const raw=localStorage.getItem('kalkulace_nahrad_v3'); if(!raw)return;
    const data=JSON.parse(raw);
    if(data.objekty&&data.objekty.length>0){
      S.project=data.project||S.project; S.objekty=data.objekty; S.catalog=data.catalog||{stavajici:[],nova:[]};
      S.objekty.forEach(o=>{ if(!o.extras)o.extras=[]; });
      const ids=[...S.objekty.flatMap(o=>[o.id,...o.rows.map(r=>r.id)]),...(S.catalog.stavajici||[]).map(i=>i.id),...(S.catalog.nova||[]).map(i=>i.id)].filter(Boolean);
      _rid=_oid=_cid=(ids.length?Math.max(...ids):0)+1;
    }
  } catch(e){}
}
